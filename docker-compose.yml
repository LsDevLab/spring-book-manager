services:
  postgres:
    image: postgres:16
    container_name: books-manager-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: books-manager-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: