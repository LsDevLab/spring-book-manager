# Shared config — applies to all profiles
server:
  port: 8081



spring:
  profiles:
    active: dev

  cache:
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m
    redis:
      time-to-live: 30m

  graphql:
    graphiql:
      enabled: true

jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough-for-hmac
  expiration: 24h

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,scheduledtasks,caches

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs


