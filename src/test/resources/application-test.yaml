
spring:
  # DataSource — Spring Boot auto-creates a DataSource bean from these props
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379